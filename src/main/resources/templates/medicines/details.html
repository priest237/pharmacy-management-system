<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${medicine.name} + ' | PharmaCare'">Medicine Details | PharmaCare</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="page-bg">
    <section class="medicine-detail-shell">
        <a class="back-link" th:href="@{/medicines}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 12H5"></path>
                <path d="m12 19-7-7 7-7"></path>
            </svg>
            Back to catalog
        </a>

        <div class="medicine-detail-card">
            <div class="medicine-detail-card__media">
                <img th:if="${medicine.imageUrl != null and !#strings.isEmpty(medicine.imageUrl)}"
                     th:src="${medicine.imageUrl}"
                     th:alt="${medicine.name}" />
                <div class="catalog-card__placeholder medicine-detail-card__placeholder"
                     th:if="${medicine.imageUrl == null or #strings.isEmpty(medicine.imageUrl)}">
                    <span th:text="${#strings.substring(medicine.name, 0, 1)}">M</span>
                </div>
            </div>

            <div class="medicine-detail-card__content">
                <span class="availability-badge"
                      th:classappend="${medicine.stockQuantity > 0} ? ' in-stock' : ' out-stock'"
                      th:text="${medicine.stockQuantity > 0} ? 'Available now' : 'Currently unavailable'">Available now</span>
                <h1 th:text="${medicine.name}">Medicine Name</h1>
                <p class="medicine-detail-card__description" th:text="${medicine.description}">Medicine description</p>
                <a class="read-more-link" href="#" onclick="toggleDescription(this); return false;">Read more</a>

                <div class="medicine-detail-stats">
                    <article>
                        <span>Price</span>
                        <strong th:text="'CFA ' + ${#numbers.formatDecimal(medicine.price, 1, 2)}">CFA 0.00</strong>
                    </article>
                    <article>
                        <span>Stock Quantity</span>
                        <strong th:text="${medicine.stockQuantity}">0</strong>
                    </article>
                    <article>
                        <span>Expiry Date</span>
                        <strong th:text="${#temporals.format(medicine.expiryDate, 'dd MMM yyyy')}">30 Sep 2026</strong>
                    </article>
                </div>

                <div class="catalog-card__actions">
                    <form th:if="${medicine.stockQuantity > 0}" th:action="@{/cart/add}" method="post" class="detail-cart-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="medicineId" th:value="${medicine.id}" />
                        <input type="hidden" name="redirectTo" th:value="'/medicines/' + ${medicine.id}" />
                        <label class="cart-qty-control">
                            <span>Quantity</span>
                            <input type="number" name="quantity" min="1" th:max="${medicine.stockQuantity}" value="1" />
                        </label>
                        <button type="submit" class="btn primary">Add to cart</button>
                    </form>
                    <a class="btn subtle button-link" th:href="@{/dashboard}">Back to dashboard</a>
                    <a class="btn subtle button-link" th:href="@{/cart}">View cart</a>
                    <a class="btn primary button-link" th:if="${role == 'ADMIN'}" th:href="@{/admin/medicines/{id}/edit(id=${medicine.id})}">Edit medicine</a>
                </div>
            </div>
        </div>
    </section>
</div>
<script>
function toggleDescription(link) {
    const desc = link.previousElementSibling;
    if (desc.style.display === '-webkit-box') {
        desc.style.display = 'block';
        desc.style.webkitLineClamp = 'none';
        link.textContent = 'Read less';
    } else {
        desc.style.display = '-webkit-box';
        desc.style.webkitLineClamp = '3';
        link.textContent = 'Read more';
    }
}
</script>
</body>
</html>
