<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account | Pharmacy Management</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="data:;base64,=" />
</head>
<body>
<div class="page-bg">
    <div class="card">
        <a class="back-link" th:href="@{/}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 12H5"></path>
                <path d="m12 19-7-7 7-7"></path>
            </svg>
            Back to home
        </a>

        <div class="card-header">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3.19.79-4.5 2.09C10.69 3.79 9.26 3 7.5 3A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path>
                <path d="M12 7v10"></path>
                <path d="M7 12h10"></path>
            </svg>
            <h1 class="title">Create Account</h1>
            <p class="subtitle">Sign up to access your healthcare dashboard.</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="form">
            <div class="input-row">
                <label>Full Name <span class="required">*</span></label>
                <input type="text" th:field="*{fullName}" placeholder="John Doe" required />
            </div>

            <div class="input-row">
                <label>Email <span class="required">*</span></label>
                <input type="email" th:field="*{email}" placeholder="you@clinic.com" required />
            </div>

            <div class="input-row">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" placeholder="(555) 123-4567" />
            </div>

            <div class="input-row">
                <label>Password <span class="required">*</span></label>
                <input type="password" th:field="*{password}" placeholder="••••••••" required />
            </div>

            <div class="input-row">
                <label>Confirm Password <span class="required">*</span></label>
                <input type="password" name="confirmPassword" placeholder="••••••••" required />
            </div>

            <input type="hidden" th:field="*{role}" value="USER" />

            <div class="actions">
                <button type="submit" class="btn primary">Create account</button>
                <a class="text-link" th:href="@{/login}">Already have an account? Login</a>
            </div>
        </form>
    </div>
</div>

<div class="toast error" th:if="${error}">
    <span th:text="${error}"></span>
</div>

<script>
  document.querySelectorAll(".toast").forEach(function (toast) {
    toast.classList.add("show");
    setTimeout(function () { toast.classList.remove("show"); }, 4000);
  });
</script>
</body>
</html>
