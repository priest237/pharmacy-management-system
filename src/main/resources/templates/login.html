<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Pharmacy Management</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="page-bg">
    <div class="card small">
        <div class="brand">
            <span class="cross" aria-hidden="true"></span>
            <span class="brand-text">Pharmacy Care</span>
        </div>
        <h2>Welcome back</h2>
        <p class="subtle">Sign in to continue your medical workflow.</p>

        <form th:action="@{/login}" method="post" class="form">
            <div class="input-row">
                <label>Email</label>
                <input type="email" name="username" placeholder="you@clinic.com" required />
            </div>

            <div class="input-row">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required />
            </div>

            <div class="actions">
                <button type="submit" class="btn primary">Login</button>
                <a class="btn ghost" th:href="@{/register}">Create account</a>
            </div>

            <div class="error" th:if="${param.error}">
                <p>Invalid credentials. Please check your email and password.</p>
            </div>
        </form>
    </div>
</div>
</body>
</html>
