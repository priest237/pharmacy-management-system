<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Pharmacy Management</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="page-bg">
    <div class="card">
        <div class="card-header">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2 3 7v6c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11V7l-9-5Z"></path>
                <path d="M12 11v4"></path>
                <path d="M12 8h.01"></path>
            </svg>
            <h1 class="title">Admin Dashboard</h1>
            <p class="subtitle">Manage pharmacy operations and user access.</p>
        </div>

        <div class="actions">
            <a class="btn primary button-link" th:href="@{/admin/medicines}">Manage inventory</a>
            <a class="btn primary button-link" th:href="@{/admin/audit-logs}">View audit logs</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn primary">Logout</button>
            </form>
            <a class="text-link" th:href="@{/home}">Go to user home</a>
        </div>
    </div>
</div>
</body>
</html>
